services:
  backend:
    build: ./backend
    container_name: soundcloud-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    environment:
      # MinIO
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_AUDIO: tracks
      MINIO_BUCKET_IMAGES: images
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - redis
      - minio

  frontend:
    build: ./frontend
    container_name: soundcloud-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: soundcloud-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: soundcloud-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:

