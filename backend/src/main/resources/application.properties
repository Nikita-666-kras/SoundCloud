spring.application.name=soundcloud-backend

spring.datasource.url=jdbc:h2:file:./data/soundcloud
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.upload-dir=uploads/tracks

# MinIO (для docker-compose URL будет переопределён переменными окружения при необходимости)
minio.url=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket.audio=tracks
minio.bucket.images=images

# Redis (временно кеш отключён)
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.cache.type=none

server.port=8080

# JWT (в проде задать через переменные окружения)
jwt.secret=your-256-bit-secret-change-in-production-must-be-long-enough
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

