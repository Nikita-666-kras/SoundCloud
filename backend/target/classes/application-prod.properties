# Профиль prod (docker / VPS): PostgreSQL
spring.jpa.show-sql=false
spring.h2.console.enabled=false
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/soundcloud}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:soundcloud}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:soundcloud}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
