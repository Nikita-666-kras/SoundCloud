spring.application.name=soundcloud-backend

spring.datasource.url=jdbc:h2:file:./data/soundcloud
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Список origin через запятую (прод: задать APP_CORS_ALLOWED_ORIGINS или CORS_ALLOWED_ORIGINS в env)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.upload-dir=uploads/tracks

# MinIO (для docker-compose URL будет переопределён переменными окружения при необходимости)
minio.url=http://minio:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket.audio=tracks
minio.bucket.images=images

# Redis (временно кеш отключён)
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.cache.type=none

server.port=8080
# За reverse-proxy / TLS termination
server.forward-headers-strategy=framework

# JWT (в проде обязательно JWT_SECRET)
jwt.secret=${JWT_SECRET:your-256-bit-secret-change-in-production-must-be-long-enough}
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

